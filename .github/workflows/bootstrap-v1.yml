name: Publish Revisit v1.0 source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-v1.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunk-*.b64 | base64 --decode > /tmp/revisit-v1.0.zip
          rm -rf /tmp/revisit-src
          mkdir -p /tmp/revisit-src
          unzip -q /tmp/revisit-v1.0.zip -d /tmp/revisit-src
          cp -a /tmp/revisit-src/revisit-reading-inbox/. .
          rm -rf .bootstrap
          rm -f .init
          rm -f .github/workflows/bootstrap-v1.yml
      - name: Commit source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: publish Revisit v1.0 source"
          git push
